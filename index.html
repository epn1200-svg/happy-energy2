<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>聲光探險隊：大笑臉噴發儀</title>
  <style>
    :root { 
      --primary: #ff6b6b; 
      --secondary: #4ecdc4; 
      --bg: #eef2f3; 
    }
    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
    }
    h1 { color: var(--primary); text-shadow: 2px 2px #fff; margin: 10px 0; font-size: 1.8rem; }
    
    /* 畫布容器 */
    .canvas-box {
      background: #fff; border: 5px solid var(--secondary); border-radius: 25px;
      padding: 5px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); position: relative;
    }
    canvas { 
      width: 85vw; max-width: 600px; height: 400px; 
      display: block; background: #fff; border-radius: 20px; 
    }

    /* 進度條 */
    .progress-container {
      width: 80vw; max-width: 600px; height: 40px;
      background: #ddd; border-radius: 20px; margin: 20px 0;
      border: 3px solid #333; overflow: hidden; position: relative;
    }
    #progressBar {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #ff9a9e, #fecfef, var(--secondary));
      transition: width 0.1s linear;
    }

    button {
      background: var(--primary); color: white; border: none;
      padding: 20px 50px; font-size: 1.5rem; border-radius: 60px;
      cursor: pointer; box-shadow: 0 6px #ee5253; font-weight: bold;
    }
    button:active { transform: translateY(3px); box-shadow: 0 2px #ee5253; }
    
    #statusMsg { font-size: 1.2rem; font-weight: bold; margin-top: 10px; color: #555; height: 1.5em; }

    /* 過關成功畫面 */
    #successOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.97); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    .big-emoji { font-size: 6rem; animation: bounce 1s infinite; }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
  </style>
</head>
<body>

  <h1>🚀 聲光探險隊：大笑臉噴發儀</h1>
  
  <div class="canvas-box">
    <canvas id="particleCanvas"></canvas>
  </div>

  <div class="progress-container">
    <div id="progressBar"></div>
  </div>
  
  <p id="statusMsg">點擊按鈕，用大笑噴出能量笑臉！</p>
  <button id="startBtn">啟動集能儀</button>

  <div id="successOverlay">
    <div class="big-emoji">🎉</div>
    <h2 style="color:var(--primary); font-size: 3rem;">能量收集完成！</h2>
    <p style="font-size:1.5rem">太棒了！快樂能量充滿整個校園！</p>
    <button onclick="location.reload()">再次挑戰</button>
  </div>

  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const progressBar = document.getElementById('progressBar');
    const statusMsg = document.getElementById('statusMsg');
    const successOverlay = document.getElementById('successOverlay');

    let audioCtx, analyser, dataArray, animationId;
    let energy = 0;
    let particles = [];
    const targetEnergy = 100;
    const emojis = ["😊", "😆", "🤣", "✨", "🎈", "🍭", "🤪"];

    function resize() {
      canvas.width = canvas.clientWidth * window.devicePixelRatio;
      canvas.height = canvas.clientHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resize);
    resize();

    startBtn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);

        startBtn.style.display = 'none';
        statusMsg.innerText = "大聲笑出來！把笑臉噴向天空！";
        update();
      } catch (err) {
        statusMsg.innerHTML = "<span style='color:red'>錯誤：請點擊網址左側 AA 並允許麥克風</span>";
      }
    });

    // 粒子類別：控制【大尺寸】笑臉
    class Particle {
      constructor(maxAmp) {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 150; // 從畫面下方更深處噴出
        
        // --- 笑臉大小設定 ---
        // 基礎 50px，最大可達 130px
        this.size = 50 + Math.random() * 80; 
        
        // 噴發速度：聲音越大飛越快
        this.speedY = 4 + Math.random() * 8 + (maxAmp / 8); 
        this.speedX = (Math.random() - 0.5) * 6; // 左右飄移幅度
        this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
        this.opacity = 1;
        this.rotation = Math.random() * Math.PI * 2; // 隨機旋轉
        this.rotateSpeed = (Math.random() - 0.5) * 0.1;
      }
      
      update() {
        this.y -= this.speedY;
        this.x += this.speedX;
        this.rotation += this.rotateSpeed;
        this.opacity -= 0.003; // 消失速度變慢一點
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        // 加入陰影讓大笑臉更有質感
        ctx.shadowColor = 'rgba(0, 0, 0, 0.15)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetX = 8;
        ctx.shadowOffsetY = 8;
        
        ctx.font = `${this.size}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.emoji, 0, 0);
        ctx.restore();
      }
    }

    function update() {
      animationId = requestAnimationFrame(update);
      analyser.getByteTimeDomainData(dataArray);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let maxAmp = 0;
      for (let i = 0; i < dataArray.length; i++) {
        let amp = Math.abs(dataArray[i] - 128);
        if (amp > maxAmp) maxAmp = amp;
      }

      // 靈敏度門檻 (20 為中等，調高更難)
      if (maxAmp > 20) {
        // 產生頻率：0.4 代表每幀有 40% 機率噴出一個大笑臉
        if (Math.random() < 0.4) {
          particles.push(new Particle(maxAmp));
        }
        
        // 進度累積速度：0.7 為適中，大約笑 10 秒過關
        energy += 1.4;
        if (energy > targetEnergy) energy = targetEnergy;
        progressBar.style.width = energy + "%";
      }

      // 更新與繪製笑臉
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].y < -200 || particles[i].opacity <= 0) {
          particles.splice(i, 1);
        }
      }

      // 文字進度回饋
      if (energy > 0 && energy < 100) {
        statusMsg.innerText = `快樂能量累積中：${Math.floor(energy)}%`;
      }

      if (energy >= targetEnergy) {
        cancelAnimationFrame(animationId);
        setTimeout(() => {
          successOverlay.style.display = 'flex';
        }, 500);
      }
    }
  </script>
</body>
</html>
